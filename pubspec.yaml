name: luilaykhao_app
description: "Luilaykhao Customer App - Track your van in real-time"
version: 1.10.0+39

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_map_animations: ^0.10.0
  google_fonts: ^8.1.0
  http: ^1.6.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  provider: ^6.1.5+1
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  geolocator: ^14.0.3
  cached_network_image: ^3.4.1
  video_player: ^2.9.2
  chewie: ^1.8.5
  shimmer: ^3.0.0
  app_links: ^7.0.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  firebase_crashlytics: ^5.0.0
  firebase_analytics: ^12.0.0
  flutter_local_notifications: ^22.0.1
  share_plus: ^13.1.0
  web_socket_channel: ^3.0.1
  flutter_secure_storage: ^10.0.0-beta.4
  local_auth: ^3.0.1
  connectivity_plus: ^7.1.1
  package_info_plus: ^10.1.0
  in_app_review: ^2.0.10
  vibration: ^3.1.8
  audioplayers: ^6.1.0
  sign_in_with_apple: ^8.1.0
  flutter_svg: ^2.3.0
  flutter_widget_from_html_core: ^0.17.2
  add_2_calendar: ^3.0.1
  google_maps_flutter: ^2.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "logo.png"
  image_path_ios: "logo_ios.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "logo.png"
  android_12:
    color: "#FFFFFF"
    image: "logo.png"
  color_dark: "#FFFFFF"
  image_dark: "logo.png"
  android: true
  ios: true

flutter:
  uses-material-design: true
  generate: true
  assets:
    - logo.png
    - logo_ios.png
    - assets/audio/sos_siren.wav
    - assets/icons/google_2025.svg
  fonts:
    # Latin + numerals (variable font; weight applied via fontWeight).
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    # Thai face (static weights). Used as the fallback after Inter so Latin
    # glyphs render in Inter and Thai glyphs fall through to LINE Seed Sans TH.
    # Note: only Regular (400) and Bold (700) are shipped; requests for the
    # in-between weights (500/600) and w800 render at the nearest available
    # weight.
    - family: LINE Seed Sans TH
      fonts:
        - asset: assets/fonts/LINESeedSansTH_A_Rg.ttf
          weight: 400
        - asset: assets/fonts/LINESeedSansTH_A_Bd.ttf
          weight: 700
