name: luilaykhao_app
description: "Luilaykhao Customer App - Track your van in real-time"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^8.2.2
  flutter_map_animations: ^0.9.0
  google_fonts: ^6.2.1
  http: ^1.6.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  provider: ^6.1.5+1
  shared_preferences: ^2.3.5
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  app_links: ^7.0.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  image_path: "logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
